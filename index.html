<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Jonnel Esguerra builds automation systems across workflow automation, AI agents, manufacturing IT, and knowledge operations."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (() => {
        const key = "portfolio-theme-mode";
        const stored = localStorage.getItem(key);
        const mode = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
        const effective =
          mode === "system" && matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : mode === "dark" ? "dark" : "light";
        document.documentElement.dataset.theme = effective;
        document.documentElement.style.colorScheme = effective;
      })();
    </script>
    <title>Jonnel Esguerra | Automation Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
